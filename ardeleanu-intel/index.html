  <style>
:root {
  --primary:    #7B1C16;  /* Falu Red */
  --wheat:      #F2DAB7;
  --cream:      #F5EDE3;
  --olive:      #B5BD5C;
  --safari:     #168247;  /* Dental Safari green */
  --amber:      #C9A227;
  --yellow:     #FBE483;
  --terracotta: #dd7e6b;
  --alert:      #FF0300;
  --ink:        #222222;
  --white:      #FFFFFF;
  --line:       #e7ddd0;
  --shadow:     0 2px 10px rgba(123, 28, 22, .07);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Poppins', sans-serif;
  color: var(--ink);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

/* ---------- GATE ---------- */
.gate[hidden] { display: none !important; }
.gate {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: var(--primary);
  background-image: radial-gradient(circle at 30% 20%, #8f2820 0%, var(--primary) 55%);
  padding: 24px;
}
.gate-card {
  background: var(--white); border-radius: 18px; padding: 38px 34px;
  width: 100%; max-width: 380px; box-shadow: 0 18px 50px rgba(0,0,0,.28); text-align: center;
}
.gate-logo-img { height: 52px; width: auto; margin-bottom: 18px; }
.gate-card h1 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--primary); margin: 0 0 6px; }
.gate-sub { font-size: 13px; color: #7a6e63; margin: 0 0 22px; }
.gate-card input {
  width: 100%; padding: 13px 14px; border: 1.5px solid var(--line);
  border-radius: 10px; font-size: 15px; margin-bottom: 12px; outline: none;
}
.gate-card input:focus { border-color: var(--amber); }
.gate-card button {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  background: var(--primary); color: var(--white); font-weight: 600; font-size: 15px; transition: background .15s;
}
.gate-card button:hover { background: #66160f; }
.gate-error { color: var(--alert); font-size: 13px; margin: 12px 0 0; }

/* ---------- TOPBAR ---------- */
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 16px 28px; background: var(--white); border-bottom: 3px solid var(--primary);
}
.topbar .logo { height: 46px; width: auto; display: block; }
.brand-tag {
  font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; color: var(--primary);
  text-align: right; line-height: 1.1;
}

/* ---------- LAYOUT ---------- */
.wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

/* ---------- FILTRE ---------- */
.filters { background: var(--white); border-radius: 14px; padding: 18px 18px 8px; box-shadow: var(--shadow); margin-bottom: 18px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }

.seg { display: inline-flex; background: var(--cream); border-radius: 10px; padding: 3px; gap: 2px; }
.seg-btn {
  border: none; background: transparent; padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500; color: #6f655b; transition: all .15s;
}
.seg-btn.active { background: var(--primary); color: var(--white); }

.chips { gap: 8px; }
.chip {
  border: 1.5px solid var(--line); background: var(--white); color: #6f655b;
  padding: 7px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 500; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.chip:hover { border-color: var(--amber); }
.chip.active { background: var(--primary); border-color: var(--primary); color: var(--white); }
.chip .tag { font-size: 10px; opacity: .65; font-weight: 400; }
.chip.cad-monthly.active { background: var(--amber); border-color: var(--amber); color: var(--ink); }

.tools { gap: 10px; }
.tools input[type="search"] {
  flex: 1; min-width: 200px; padding: 10px 14px; border: 1.5px solid var(--line);
  border-radius: 10px; font-size: 14px; outline: none;
}
.tools input[type="search"]:focus { border-color: var(--amber); }
.tools input[type="month"] { padding: 9px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-size: 13px; outline: none; }
.ghost { background: transparent; border: 1.5px solid var(--line); color: #6f655b; padding: 9px 16px; border-radius: 10px; font-size: 13px; }
.ghost:hover { border-color: var(--primary); color: var(--primary); }

/* ---------- META LINE ---------- */
.meta-line { display: flex; justify-content: space-between; align-items: baseline; margin: 4px 4px 16px; font-size: 13px; }
#result-count { font-weight: 600; color: var(--primary); }
.muted { color: #9a8e82; font-size: 12px; }

/* ---------- GRID ---------- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card {
  background: var(--white); border-radius: 14px; padding: 18px; box-shadow: var(--shadow);
  text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 10px;
  border-left: 5px solid var(--primary); transition: transform .12s, box-shadow .12s;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(123,28,22,.14); }
.card.brand-kids { border-left-color: var(--safari); }

.card-top { display: flex; align-items: center; gap: 8px; }
.badge {
  font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 999px;
}
.badge-brand { background: var(--wheat); color: var(--primary); }
.card.brand-kids .badge-brand { background: #d8f0e0; color: var(--safari); }
.badge-cad { background: var(--cream); color: #7a6e63; }

.card-channel { font-size: 12px; font-weight: 600; color: var(--amber); letter-spacing: 1px; text-transform: uppercase; }
.card-title { font-size: 15px; font-weight: 700; line-height: 1.3; margin: 0; }
.card-period { font-size: 13px; color: #6f655b; }
.card-foot { margin-top: auto; font-size: 12px; color: #9a8e82; display: flex; justify-content: space-between; align-items: center; }
.card-foot .open { color: var(--primary); font-weight: 600; }

.empty { text-align: center; color: #9a8e82; padding: 50px 0; font-size: 15px; }

/* ---------- FOOTER ---------- */
.foot { padding: 20px 0; }

@media (max-width: 540px) {
  .topbar { padding: 14px 18px; }
  .grid { grid-template-columns: 1fr; }
  .tools input[type="search"] { min-width: 100%; }
}

/* =====================================================================

/* ---------------------------------------------------------------------
   1. GATE DE PAROLĂ (client-side, SHA-256)
   Parola NU e stocată în clar. Aici e doar hash-ul ei.
   Parola este:  Ardeleanu123
   Ca să o schimbi: pe localhost deschide consola și rulează
     crypto.subtle.digest('SHA-256', new TextEncoder().encode('PAROLA_NOUA'))
       .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')));
   apoi pune rezultatul în PASSWORD_HASH.
--------------------------------------------------------------------- */
const PASSWORD_HASH =
  "244490295cd315a03972d03d79a81e05bfc581eb76cf3d6ae2f28236446287cd";
const SESSION_KEY = "ai_intel_ok";

async function sha256(text) {
  if (window.crypto && crypto.subtle && window.isSecureContext) {
    try {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].map((x) => x.toString(16).padStart(2, "0")).join("");
    } catch (_) {}
  }
  return sha256js(text);
}

function sha256js(ascii) {
  function rr(v, a) { return (v >>> a) | (v << (32 - a)); }
  const mp = Math.pow, maxWord = mp(2, 32);
  let result = "";
  const words = [];
  const bitLen = ascii.length * 8;
  let hash = sha256js.h = sha256js.h || [];
  const k = sha256js.k = sha256js.k || [];
  let pc = k.length;
  const composite = {};
  for (let cand = 2; pc < 64; cand++) {
    if (!composite[cand]) {
      for (let i = 0; i < 313; i += cand) composite[i] = cand;
      hash[pc] = (mp(cand, 0.5) * maxWord) | 0;
      k[pc++] = (mp(cand, 1 / 3) * maxWord) | 0;
    }
  }
  ascii += "\x80";
  while (ascii.length % 64 - 56) ascii += "\x00";
  for (let i = 0; i < ascii.length; i++) {
    const j = ascii.charCodeAt(i);
    if (j >> 8) return "";
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = (bitLen / maxWord) | 0;
  words[words.length] = bitLen;
  for (let j = 0; j < words.length;) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (let i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const t1 = hash[7]
        + (rr(e, 6) ^ rr(e, 11) ^ rr(e, 25))
        + ((e & hash[5]) ^ ((~e) & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
            w[i - 16]
            + (rr(w15, 7) ^ rr(w15, 18) ^ (w15 >>> 3))
            + w[i - 7]
            + (rr(w2, 17) ^ rr(w2, 19) ^ (w2 >>> 10))
          ) | 0);
      const t2 = (rr(a, 2) ^ rr(a, 13) ^ rr(a, 22))
        + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(t1 + t2) | 0].concat(hash);
      hash[4] = (hash[4] + t1) | 0;
    }
    for (let i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (let i = 0; i < 8; i++) {
    for (let j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : "") + b.toString(16);
    }
  }
  return result;
}

function unlock() {
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").hidden = false;
  initApp();
}

function setupGate() {
  let unlocked = false;
  try { unlocked = sessionStorage.getItem(SESSION_KEY) === "1"; } catch (_) {}
  if (unlocked) { unlock(); return; }
  const input = document.getElementById("gate-input");
  const btn = document.getElementById("gate-btn");
  const err = document.getElementById("gate-error");
  async function tryUnlock() {
    try {
      const hash = await sha256(input.value);
      if (hash === PASSWORD_HASH) {
        try { sessionStorage.setItem(SESSION_KEY, "1"); } catch (_) {}
        unlock();
      } else {
        err.textContent = "Parolă greșită.";
        err.hidden = false; input.value = ""; input.focus();
      }
    } catch (e) {
      err.textContent = "Eroare la verificare. Deschide pagina prin localhost / server.";
      err.hidden = false; console.error(e);
    }
  }
  btn.addEventListener("click", tryUnlock);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });
  input.focus();
}

/* ---------------------------------------------------------------------
   2. APLICAȚIA
   Datele vin din data/data.js (window.__CONFIG__ / window.__REPORTS__),
   ca să funcționeze și pe file://. Dacă lipsesc, încearcă fetch (server).
--------------------------------------------------------------------- */
let CONFIG = null;
let REPORTS = [];
const state = { brand: "", cadence: "", channel: "", search: "", month: "" };

async function initApp() {
  try {
    let manifest;
    if (window.__CONFIG__ && window.__REPORTS__) {
      CONFIG = window.__CONFIG__;
      manifest = window.__REPORTS__;
    } else {
      const [cfg, man] = await Promise.all([
        fetch("data/config.json").then((r) => r.json()),
        fetch("data/reports.json").then((r) => r.json()),
      ]);
      CONFIG = cfg; manifest = man;
    }
    REPORTS = (manifest && manifest.reports) || [];
    document.getElementById("manifest-date").textContent =
      manifest && manifest.generated_at
        ? "Actualizat " + new Date(manifest.generated_at).toLocaleDateString("ro-RO")
        : "";
    buildBrandFilter();
    buildChannelFilter();
    wireFilters();
    render();
  } catch (e) {
    document.getElementById("grid").innerHTML =
      '<p class="empty">Nu am putut încărca rapoartele. Rulează <code>node scripts/build-manifest.mjs</code> și reîncarcă.</p>';
    console.error(e);
  }
}

function buildBrandFilter() {
  const wrap = document.getElementById("f-brand");
  for (const [key, b] of Object.entries(CONFIG.brands)) {
    const btn = document.createElement("button");
    btn.className = "seg-btn";
    btn.dataset.val = key;
    btn.textContent = b.label;
    wrap.appendChild(btn);
  }
}

function buildChannelFilter() {
  const wrap = document.getElementById("f-channel");
  for (const [key, ch] of Object.entries(CONFIG.channels)) {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.val = key;
    btn.textContent = ch.label;
    wrap.appendChild(btn);
  }
}

const CADENCE_LABEL = { weekly: "săptămânal", monthly: "lunar", daily: "zilnic" };

function wireFilters() {
  document.querySelectorAll(".seg").forEach((seg) => {
    const key = seg.dataset.key;
    seg.addEventListener("click", (e) => {
      const btn = e.target.closest(".seg-btn");
      if (!btn) return;
      seg.querySelectorAll(".seg-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      state[key] = btn.dataset.val;
      render();
    });
  });
  const chWrap = document.getElementById("f-channel");
  chWrap.addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    chWrap.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");
    state.channel = chip.dataset.val;
    render();
  });
  document.getElementById("f-search").addEventListener("input", (e) => {
    state.search = e.target.value.toLowerCase().trim();
    render();
  });
  document.getElementById("f-month").addEventListener("input", (e) => {
    state.month = e.target.value;
    render();
  });
  document.getElementById("f-clear").addEventListener("click", () => {
    Object.assign(state, { brand: "", cadence: "", channel: "", search: "", month: "" });
    document.getElementById("f-search").value = "";
    document.getElementById("f-month").value = "";
    document.querySelectorAll(".seg").forEach((seg) => {
      seg.querySelectorAll(".seg-btn").forEach((b, i) => b.classList.toggle("active", i === 0));
    });
    document.querySelectorAll("#f-channel .chip").forEach((c, i) => c.classList.toggle("active", i === 0));
    render();
  });
}

function matches(r) {
  if (state.brand && r.brand !== state.brand) return false;
  if (state.cadence && r.cadence !== state.cadence) return false;
  if (state.channel && r.channel !== state.channel) return false;
  if (state.month && !(r.date || "").startsWith(state.month)) return false;
  if (state.search) {
    const hay = (r.title + " " + r.period_label).toLowerCase();
    if (!hay.includes(state.search)) return false;
  }
  return true;
}

function render() {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const list = REPORTS.filter(matches);

  document.getElementById("result-count").textContent =
    list.length + (list.length === 1 ? " raport" : " rapoarte");

  grid.innerHTML = "";
  empty.hidden = list.length !== 0;

  for (const r of list) {
    const ch = (CONFIG.channels[r.channel] || {});
    const brandLabel = (CONFIG.brands[r.brand] || {}).label || r.brand;
    const a = document.createElement("a");
    a.className = "card" + (r.brand === "kids" ? " brand-kids" : "");
    a.href = r.path;
    a.innerHTML =
      '<div class="card-top">' +
        '<span class="badge badge-brand">' + brandLabel + '</span>' +
        '<span class="badge badge-cad">' + (CADENCE_LABEL[r.cadence] || r.cadence) + '</span>' +
      '</div>' +
      '<div class="card-channel">' + (ch.label || r.channel) + '</div>' +
      '<h3 class="card-title">' + escapeHtml(r.title) + '</h3>' +
      '<div class="card-period">' + escapeHtml(r.period_label || "") + '</div>' +
      '<div class="card-foot"><span>' + (r.date || "") + '</span><span class="open">Deschide →</span></div>';
    grid.appendChild(a);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

document.addEventListener("DOMContentLoaded", setupGate);

  </script>
</body>
</html>
